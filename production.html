    <style>
        body {
            overflow-x: hidden;
        }

        .proddetails-section {
            position: relative;
        }

        .section-tag {
            display: inline-block;
            font-size: 25px;
            color: #444;
            margin-bottom: 0px;
            font-family: "Cormorant Garamond", serif;
        }

        .prod-title {
            font-family: "Cormorant Garamond", serif;
            font-size: 40px;
            line-height: 1.1;
            color: #c5ab8a;
            margin-bottom: 5px;
        }

        .prod-desc {
            font-size: 12px;
            line-height: 1.9;
            color: #444;
            margin-bottom: 25px;
            text-align: justify;
            hyphens: auto;
            -webkit-hyphens: auto;
            -ms-hyphens: auto;

            p {
                margin: 0rem 1rem;
            }
        }

        .prod-qa {
            font-size: 14px;
            line-height: 1.9;
            color: #444;
            margin-bottom: 0;

            p {
                margin-bottom: 1.5rem;
            }
        }

        .appointment-btn:hover {
            background: #c5ab8a;
            border-color: #c5ab8a;
            color: #fff;
        }

        .image-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-circle {
            width: 600px;
            height: 600px;
            border-radius: 50%;
            overflow: hidden;
            background: #efe8df;
            margin-top: 1rem;
        }

        .main-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .play-btn {
            transform: translateY(-50%);
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: white;
            border: 1px solid #c5ab8a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            cursor: pointer;
            z-index: 2;
            animation: dotsRotate 30s linear infinite;
        }

        @media (max-width: 991px) {
            .prod-title {
                font-size: 52px;
            }

            .main-circle {
                width: 450px;
                height: 450px;
                margin-top: 60px;
            }

            .play-btn {
                width: 100px;
                height: 100px;
                left: 20px;
            }
        }

        @media (max-width: 576px) {
            .prod-title {
                font-size: 40px;
            }

            .benefits-grid {
                grid-template-columns: 1fr;
            }

            .main-circle {
                width: 320px;
                height: 320px;
            }
        }

        .prodgallery-section {
            padding: 80px 0;
            overflow: hidden;
        }

        .gallery-row {
            overflow: visible;
            position: relative;
            cursor: grab;
        }

        .gallery-track {
            display: flex;
            gap: 20px;
            width: max-content;
            user-select: none;
            -webkit-user-drag: none;
            cursor: grab;
            will-change: transform;
        }

        .gallery-track.paused {
            animation-play-state: paused;
        }

        .gallery-track img {
            width: 250px;
            height: 250px;
            object-fit: cover;
            border-radius: 150px;
            flex-shrink: 0;
            transition: all 0.4s ease;
            pointer-events: auto;
            user-select: none;
            -webkit-user-drag: none;
        }

        .gallery-track img:hover {
            transform: scale(1.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            border-left: 7px solid #c5ab8a;
        }

        .gallery-item {
            position: relative;
            width: 250px;
            height: 250px;
            border-radius: 150px;
            overflow: hidden;
            flex-shrink: 0;
            cursor: pointer;
        }

        .gallery-item::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.45)),
                url("assets/mandala/full-ring.jpg") center/cover no-repeat;
            opacity: 0;
            transition: 0.4s ease;
            z-index: 1;
        }

        .gallery-item::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            color: #000000;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 3px;
            opacity: 0;
            transition: 0.4s ease;
            z-index: 2;
        }

        .gallery-item:hover::before {
            opacity: 1;
        }

        .gallery-item:hover::after {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .gallery-item:hover img {
            transform: scale(1.08);
        }

        .image-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.96);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;

            opacity: 0;
            visibility: hidden;
            transition: 0.35s ease;
        }

        .image-modal.active {
            opacity: 1;
            visibility: visible;
        }

        .image-modal img {
            max-width: 95vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 12px;
            transform: scale(0.9);
            transition: 0.35s ease;
        }

        .image-modal.active img {
            transform: scale(1);
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 55px;
            cursor: pointer;
            z-index: 100000;
            transition: 0.3s;
        }

        .close-modal:hover {
            transform: rotate(90deg);
            color: #c5ab8a;
        }

        .modal-actions {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100000;
        }

        .download-btn {
            display: inline-block;
            padding: 12px 28px;
            background: #c5ab8a;
            color: #fff;
            text-decoration: none;
            border-radius: 30px;
            font-size: 15px;
            transition: 0.3s;
        }

        .download-btn:hover {
            background: #fff;
            color: #c5ab8a;
        }

        @media (max-width: 767px) {

            .gallery-row {
                width: 100%;
                overflow: hidden;
            }

            .gallery-track {
                width: max-content;
                max-width: none;
            }
        }
    </style>
</head>

    <div class="container">
        <section class="proddetails-section">
            <div class="row align-items-center">

                <div class="col-lg-6 left-bull">

                    <span class="section-tag" id="productionYear"></span>

                    <h1 class="prod-title" id="productionTitle"></h1>

    <div class="image-modal" id="imageModal">

        <span class="close-modal">&times;</span>

        <img id="modalImage" src="" alt="">

        <div class="modal-actions">
            <a id="downloadBtn" download class="download-btn">
                Download Image
            </a>
        </div>

    </div>
    <script>

        const track = document.querySelector('.gallery-track');

        let position = 0;
        let speed = 0.5;

        let isDragging = false;
        let startX = 0;
        let startPosition = 0;

        function animateGallery() {

            if (!isDragging) {

                position -= speed;

                const halfWidth = track.scrollWidth / 2;

                if (Math.abs(position) >= halfWidth) {
                    position = 0;
                }

                track.style.transform = `translateX(${position}px)`;
            }

            requestAnimationFrame(animateGallery);
        }



        // HOVER PAUSE

        track.addEventListener('mouseenter', () => {
            speed = 0;
        });

        track.addEventListener('mouseleave', () => {

            if (!isDragging) {
                speed = 0.5;
            }

        });


        // DRAG START

        track.addEventListener('mousedown', (e) => {

            isDragging = true;

            startX = e.clientX;

            startPosition = position;

            track.style.cursor = 'grabbing';

        });


        // DRAG MOVE

        window.addEventListener('mousemove', (e) => {

            if (!isDragging) return;

            const dx = e.clientX - startX;

            position = startPosition + dx;

            track.style.transform = `translateX(${position}px)`;

        });


        // DRAG END

        window.addEventListener('mouseup', () => {

            if (!isDragging) return;

            isDragging = false;

            speed = 0.5;

            track.style.cursor = 'grab';

        });


        // TOUCH SUPPORT

        track.addEventListener('touchstart', (e) => {

            isDragging = true;

            startX = e.touches[0].clientX;

            startPosition = position;

        }, { passive: true });

        window.addEventListener('touchmove', (e) => {

            if (!isDragging) return;

            const dx = e.touches[0].clientX - startX;

            position = startPosition + dx;

            track.style.transform = `translateX(${position}px)`;

        }, { passive: true });

        window.addEventListener('touchend', () => {

            isDragging = false;

            speed = 0.5;

        });

    </script>
    <script>
        // FULLSCREEN IMAGE VIEW

        const modal = document.getElementById("imageModal");
        const modalImg = document.getElementById("modalImage");
        const closeModal = document.querySelector(".close-modal");
        const downloadBtn = document.getElementById("downloadBtn");

        document.getElementById("productionGallery").addEventListener("click", (e) => {
            const item = e.target.closest(".gallery-item");
            if (!item) return;

            const imgSrc = item.querySelector("img").src;

            modalImg.src = imgSrc;
            downloadBtn.href = imgSrc;

            modal.classList.add("active");
            document.body.style.overflow = "hidden";
        });
        // Close button
        closeModal.addEventListener('click', () => {

            modal.classList.remove('active');

            document.body.style.overflow = '';

        });

        // Close on background click
        modal.addEventListener('click', (e) => {

            if (e.target === modal) {

                modal.classList.remove('active');

                document.body.style.overflow = '';

            }

        });

        // Close on ESC key
        document.addEventListener('keydown', (e) => {

            if (e.key === 'Escape') {

                modal.classList.remove('active');

                document.body.style.overflow = '';

            }

        });
    </script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {

            const params = new URLSearchParams(window.location.search);
            const id = Number(params.get("id"));
            const gallery = document.getElementById("productionGallery");

            fetch("https://anandashankar.sidpz.com/home/admin/api/production/")
                .then(res => res.json())
                .then(data => {

                    const production = data.find(item => item.id === id);

                    if (!production) {
                        throw new Error("Production not found");
                    }

                    document.title = `${production.title} | Ananda Shankar Jayant`;

                    document.getElementById("productionTitle").textContent = production.title;

                    document.getElementById("productionYear").textContent =
                        `${production.production_type} • ${production.production_year}`;

                    document.getElementById("productionContent").innerHTML =
                        production.html_content;

                    document.getElementById("productionImage").src =
                        production.cover_image;

                    document.getElementById("productionImage").alt =
                        production.title;

                    document.getElementById("downloadBtn").href =
                        production.cover_image;

                    gallery.innerHTML = production.images
                        .map(img => `
                                        <div class="gallery-item">
                                            <img src="${img.image}" alt="${production.title}">
                                        </div>
                                    `)
                        .join("");

                    gallery.innerHTML += gallery.innerHTML;

                    animateGallery();
                })
                .catch(err => console.error(err));
        });
    </script>
