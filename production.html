    <script>

        const track = document.querySelector('.gallery-track');

        // Duplicate images once
        track.innerHTML += track.innerHTML;

        let position = 0;
        let speed = 0.5;

        let isDragging = false;
        let startX = 0;
        let startPosition = 0;

        function animateGallery() {

            if (!isDragging) {

                position -= speed;

                const halfWidth = track.scrollWidth / 2;

                if (Math.abs(position) >= halfWidth) {
                    position = 0;
                }

                track.style.transform = `translateX(${position}px)`;
            }

            requestAnimationFrame(animateGallery);
        }

        animateGallery();


        // HOVER PAUSE

        track.addEventListener('mouseenter', () => {
            speed = 0;
        });

        track.addEventListener('mouseleave', () => {

            if (!isDragging) {
                speed = 0.5;
            }

        });


        // DRAG START

        track.addEventListener('mousedown', (e) => {

            isDragging = true;

            startX = e.clientX;

            startPosition = position;

            track.style.cursor = 'grabbing';

        });


        // DRAG MOVE

        window.addEventListener('mousemove', (e) => {

            if (!isDragging) return;

            const dx = e.clientX - startX;

            position = startPosition + dx;

            track.style.transform = `translateX(${position}px)`;

        });


        // DRAG END

        window.addEventListener('mouseup', () => {

            if (!isDragging) return;

            isDragging = false;

            speed = 0.5;

            track.style.cursor = 'grab';

        });


        // TOUCH SUPPORT

        track.addEventListener('touchstart', (e) => {

            isDragging = true;

            startX = e.touches[0].clientX;

            startPosition = position;

        }, { passive: true });

        window.addEventListener('touchmove', (e) => {

            if (!isDragging) return;

            const dx = e.touches[0].clientX - startX;

            position = startPosition + dx;

            track.style.transform = `translateX(${position}px)`;

        }, { passive: true });

        window.addEventListener('touchend', () => {

            isDragging = false;

            speed = 0.5;

        });

    </script>
    <script>
        // FULLSCREEN IMAGE VIEW

        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImage');
        const closeModal = document.querySelector('.close-modal');

        document.querySelectorAll('.gallery-item').forEach(item => {

            item.addEventListener('click', function () {

                const imgSrc = this.querySelector('img').src;

                modalImg.src = imgSrc;

                modal.classList.add('active');

                document.body.style.overflow = 'hidden';
            });

        });

        // Close button
        closeModal.addEventListener('click', () => {

            modal.classList.remove('active');

            document.body.style.overflow = '';

        });

        // Close on background click
        modal.addEventListener('click', (e) => {

            if (e.target === modal) {

                modal.classList.remove('active');

                document.body.style.overflow = '';

            }

        });

        // Close on ESC key
        document.addEventListener('keydown', (e) => {

            if (e.key === 'Escape') {

                modal.classList.remove('active');

                document.body.style.overflow = '';

            }

        });
    </script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {

            const params = new URLSearchParams(window.location.search);
            const id = Number(params.get("id"));

            fetch("https://anandashankar.sidpz.com/home/admin/api/production/")
                .then(res => res.json())
                .then(data => {

                    const production = data.find(item => item.id === id);

                    if (!production) {
                        throw new Error("Production not found");
                    }

                    document.title = `${production.title} | Ananda Shankar Jayant`;

                    document.getElementById("productionTitle").textContent = production.title;

                    document.getElementById("productionYear").textContent =
                        `${production.production_type} • ${production.production_year}`;

                    document.getElementById("productionContent").innerHTML =
                        production.html_content;

                    document.getElementById("productionImage").src =
                        production.cover_image;

                    document.getElementById("productionImage").alt =
                        production.title;

                    document.getElementById("downloadBtn").href =
                        production.cover_image;
                })
                .catch(err => console.error(err));
        });
    </script>
