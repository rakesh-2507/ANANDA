<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ananda Shankar Jayant</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Poppins:wght@300;400;500&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="/style.css">
    <style>
        body {
            overflow: hidden;
        }

        .gallery {
            position: relative;
            width: 100%;
            height: 85vh;
            overflow: hidden
        }

        .slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity .8s ease;
            background-size: cover;
            background-position: center;
        }

        .slide.active {
            opacity: 1
        }

        .nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, .2);
            color: #fff;
            cursor: pointer;
            z-index: 10;
            font-size: 24px;
        }

        .prev {
            left: 20px
        }

        .next {
            right: 20px
        }

        .thumbs {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10
        }

        .thumbs img {
            width: 90px;
            height: 60px;
            object-fit: cover;
            cursor: pointer;
            opacity: .5;
            border: 2px solid transparent
        }

        .thumbs img.active {
            opacity: 1;
            border-color: #fff
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg">
        <div class="container">

            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <div class="logo-bg">
                    <img src="/assets/mudras/logo.png" class="logo" alt="">
                </div>
                <span class="brand">Ananda</span>
            </a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                ☰
            </button>

            <div class="collapse navbar-collapse justify-content-center" id="menu">

                <ul class="navbar-nav">

                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="aboutus.html">About Us</a></li>
                    <li class="nav-item"><a class="nav-link" href="productions.html">Productions</a></li>
                    <li class="nav-item"><a class="nav-link" href="training.html">Training</a></li>
                    <li class="nav-item"><a class="nav-link" href="media.html">Media</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>

                </ul>

            </div>

            <a href="#" class="book-btn d-none d-lg-block">
                Admissions →
            </a>

        </div>
        <img src="/assets/mandala/border1.png" width="100%" alt="">
    </nav>

    <div class="gallery">
        <div class="slide active" style="background-image:url('assets/gallery/sk1.jpg')">
        </div>
        <div class="slide" style="background-image:url('assets/gallery/sk2.jpg')">
        </div>
        <div class="slide" style="background-image:url('assets/gallery/sk3.jpg')">
        </div>
        <div class="slide" style="background-image:url('assets/gallery/sk4.jpg')">
        </div>
        <div class="slide" style="background-image:url('assets/gallery/sk5.jpg')">
        </div>
        <div class="slide" style="background-image:url('assets/gallery/sk6.jpg')">
        </div>
        <div class="slide" style="background-image:url('assets/gallery/sk7.jpg')">
        </div>
        <div class="slide" style="background-image:url('assets/gallery/sk8.jpg')">
        </div>
        <div class="slide" style="background-image:url('assets/gallery/sk9.jpg')">
        </div>
        <div class="slide" style="background-image:url('assets/gallery/sk13.jpg')">
        </div>

        <button class="nav prev">&#10094;</button>
        <button class="nav next">&#10095;</button>

        <div class="thumbs">
            <img class="active" src="assets/gallery/sk1.jpg">
            <img src="assets/gallery/sk2.jpg">
            <img src="assets/gallery/sk3.jpg">
            <img src="assets/gallery/sk4.jpg">
            <img src="assets/gallery/sk5.jpg">
            <img src="assets/gallery/sk6.jpg">
            <img src="assets/gallery/sk7.jpg">
            <img src="assets/gallery/sk8.jpg">
            <img src="assets/gallery/sk9.jpg">
            <img src="assets/gallery/sk13.jpg">
        </div>
    </div>

    <script>
        const slides = document.querySelectorAll('.slide');
        const thumbs = document.querySelectorAll('.thumbs img');
        let current = 0;

        function showSlide(index) {
            slides[current].classList.remove('active');
            thumbs[current].classList.remove('active');
            current = index;
            slides[current].classList.add('active');
            thumbs[current].classList.add('active');
        }

        document.querySelector('.next').onclick = () => showSlide((current + 1) % slides.length);
        document.querySelector('.prev').onclick = () => showSlide((current - 1 + slides.length) % slides.length);

        thumbs.forEach((thumb, i) => {
            thumb.onclick = () => showSlide(i);
        });

        setInterval(() => showSlide((current + 1) % slides.length), 5000);
    </script>

</body>

</html>
