        body {
            overflow: hidden;
        }

        .gallery {
            position: relative;
            width: 100%;
            height: 85vh;
            overflow: hidden
        }

        .slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity .8s ease;
            background-size: cover;
            background-position: center;
        }

        .slide.active {
            opacity: 1
        }

        .nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, .2);
            color: #fff;
            cursor: pointer;
            z-index: 10;
            font-size: 24px;
            align-items: center;
            display: flex;
            justify-content: center;
        }

        .prev {
            left: 20px
        }

        .next {
            right: 20px
        }

        .thumbs {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);

            display: flex;
            gap: 10px;

            max-width: 90%;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;

            z-index: 10;
            padding-bottom: 5px;

            scrollbar-width: thin;
            cursor: grab;
            scrollbar-width: none;
        }

        .thumbs::-webkit-scrollbar {
            height: 6px;
        }

        .thumbs::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, .5);
            border-radius: 10px;
        }

        .thumbs img {
            flex-shrink: 0;
            width: 90px;
            height: 60px;
            object-fit: cover;
            cursor: pointer;
            opacity: .5;
            border: 2px solid transparent;
        }

        .thumbs img.active {
            opacity: 1;
            border-color: #fff
        }

        @media(max-width:991px) {
            .nav {
                display: none;
            }
        }
    </style>

    <script>
        const slides = document.querySelectorAll('.slide');
        const thumbs = document.querySelectorAll('.thumbs img');
        let current = 0;

        function showSlide(index) {
            slides[current].classList.remove('active');
            thumbs[current].classList.remove('active');
            current = index;
            slides[current].classList.add('active');
            thumbs[current].classList.add('active');
        }

        document.querySelector('.next').onclick = () => showSlide((current + 1) % slides.length);
        document.querySelector('.prev').onclick = () => showSlide((current - 1 + slides.length) % slides.length);

        thumbs.forEach((thumb, i) => {
            thumb.onclick = () => showSlide(i);
        });

        setInterval(() => showSlide((current + 1) % slides.length), 5000);
    </script>
    <script>
        const slider = document.querySelector('.thumbs');

        let isDown = false;
        let startX;
        let scrollLeft;

        slider.addEventListener('mousedown', (e) => {
            isDown = true;
            slider.style.cursor = 'grabbing';
            startX = e.pageX - slider.offsetLeft;
            scrollLeft = slider.scrollLeft;
        });

        slider.addEventListener('mouseleave', () => {
            isDown = false;
            slider.style.cursor = 'grab';
        });

        slider.addEventListener('mouseup', () => {
            isDown = false;
            slider.style.cursor = 'grab';
        });

        slider.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - slider.offsetLeft;
            const walk = (x - startX) * 2;
            slider.scrollLeft = scrollLeft - walk;
        });
    </script>
