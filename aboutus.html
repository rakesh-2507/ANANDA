<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ananda Shankar Jayant</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/fonts.css">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/main.js"></script>
    <style>
        body {
            overflow-x: hidden !important;
        }
    </style>

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg">
        <div class="container">

            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <div class="logo-bg">
                    <img src="/assets/mudras/logo.png" class="logo" alt="">
                </div>
                <span class="brand">Ananda</span>
            </a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                ☰
            </button>

            <div class="collapse navbar-collapse justify-content-center" id="menu">

                <ul class="navbar-nav">

                    <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="aboutus.html">About Us</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="kalakshetraMenu">
                            Kalakshetra
                        </a>

                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/kalakshetra/aboutus.html">About Shankarananda
                                    Kalakshetra</a></li>
                            <li class="border-bottom-0"><a class="dropdown-item" href="/kalakshetra/tour.html">On
                                    Tour</a></li>
                        </ul>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="productions.html">Productions</a></li>
                    <li class="nav-item"><a class="nav-link" href="training.html">Training</a></li>
                    <li class="nav-item"><a class="nav-link" href="gallery.html">Media</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>

                </ul>

            </div>

            <a href="training.html" class="book-btn d-none d-lg-block">
                Admissions →
            </a>

        </div>
        <img src="/assets/mandala/border1.png" width="100%" alt="">
    </nav>

    <div class="container">
        <section class="about-section">

            <!-- LEFT IMAGE -->
            <div class="about-left">
                <div class="dots"></div>
                <img src="/assets/aboutcover.png" alt="">
            </div>

            <!-- CENTER CONTENT -->
            <div class="about-content">
                <div id="about-section"></div>
            </div>

            <!-- RIGHT IMAGE -->
            <div class="about-right">

                <div class="circle-image">
                    <img src="assets/ring.png" class="outer-img" alt="">
                    <img src="/assets/Tiger_Bull-2.jpg" class="inner-ring" alt="">
                </div>

            </div>
        </section>

    </div>

    <div class="container">
        <section class="pedagogy">
            <h2 class="text-blk heading">Pedagogy</h2>

            <div class="pedagogy-cards">

                <div class="pedagogy-card">
                    <img src="/assets/kuchipudi.png" alt="Kuchipudi">
                    <div class="pedagogy-card-content kuchipudi_content">
                        <div id="kuchipudi-section"></div>
                    </div>
                </div>

                <div class="pedagogy-card">
                    <img src="/assets/bharatanatyam.png" alt="Bharatanatyam">

                    <div class="pedagogy-card-content bharath_content">
                        <div id="bharatanatyam-section"></div>
                    </div>
                </div>

            </div>

        </section>


    </div>

    <script>
        fetch('https://anandashankar.sidpz.com/api/section/about/')
            .then(res => res.json())
            .then(data => {

                const temp = document.createElement('div');
                temp.innerHTML = data.html_content;

                // Remove hidden elements
                temp.querySelectorAll('[style*="display:none"]').forEach(el => el.remove());

                // Get individual sections
                const about = temp.querySelector('.about-content');
                const kuchipudi = temp.querySelector('.kuchipudi_content');
                const bharatanatyam = temp.querySelector('.bharath_content');

                // Render separately
                if (about) {
                    document.getElementById('about-section').innerHTML = about.innerHTML;
                }
                if (kuchipudi) {
                    document.getElementById('kuchipudi-section').innerHTML = kuchipudi.innerHTML;
                }

                if (bharatanatyam) {
                    document.getElementById('bharatanatyam-section').innerHTML = bharatanatyam.innerHTML;
                }
            })
            .catch(err => console.error(err));
    </script>
</body>

</html>
