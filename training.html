<!DOCTYPE html>

<head>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        .training-section {
            padding-top: 60px;
        }

        .main-training-card {
            border-radius: 5px;
            overflow: hidden;
            height: 100%;
        }

        .top-strip {
            height: 110px;
            background: #f4f0eb;
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 0 40px;
        }

        .top-strip img {
            width: 90px;
        }

        .top-strip span {
            font-size: 50px;
            line-height: 1;
            color: #2f3d38;
            font-family: 'Cormorant Garamond', serif;
        }

        .card-content {
            background: #d7c0a4;
            min-height: 420px;
            display: flex;
            position: relative;
            flex-direction: column;
        }

        .content-left {
            width: 100%;
            padding: 20px;
        }

        .content-left h2 span {
            display: block;
            font-weight: 700;
        }

        .content-left p {
            font-family: "Poppins", sans-serif;
            font-size: 1.3rem;
            color: #070707;
            letter-spacing: 1px;
            line-height: 1.5;
            text-align: justify;
        }

        .content-image {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .content-image img {
            width: 100%;
            object-fit: contain;
            transition: .5s;
            margin-top: 5px;
        }

        .main-training-card:hover .content-image img {
            transform: scale(1.05);
        }

        .bottom-info {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            background: #f4f0eb;
        }

        .bottom-info h6 {
            font-weight: 700;
            margin-bottom: 8px;
        }

        .bottom-info p {
            margin: 0;
            color: #555;
        }

        @media(max-width:991px) {

            .card-content {
                flex-direction: column;
            }

            .content-left,
            .content-image {
                width: 100%;
            }

            .content-left h2 {
                font-size: 50px;
            }

            .bottom-info {
                flex-direction: column;
                gap: 20px;
            }

            .mini-content {
                flex-direction: column;
            }

            .mini-image {
                width: 100%;
                border-radius: 20px;
            }

            .top-strip {
                gap: 5px;
                padding: 0px;
            }

            .top-strip span {
                font-size: 35px;
            }

            .col-lg-2 {
                display: none;
            }

        }

        .links {
            color: #335234;
            font-weight: bold;
            text-decoration: none;
            font-size: 1.2em;
        }

        .contact-card {
            height: 100%;
        }

        .contact-card h5 {
            font-family: "Poppins", sans-serif;
            margin: 0.5rem;
        }

        .contact-form .form-control {
            border-radius: 12px;
            padding: 15px 15px;
            font-family: "Poppins", sans-serif;
            box-shadow: none;
            background: rgba(255, 255, 255, 0.7);
        }

        .contact-form .form-control:focus {
            border-color: #3d564d;
            box-shadow: none;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: #3d564d;
            color: #fff;
            font-weight: 600;
            transition: .3s;
        }

        .submit-btn:hover {
            background: #2d4139;
            transform: translateY(-2px);
        }
    </style>
</head>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">

            <div class="collapse navbar-collapse justify-content-center" id="menu">

                <ul class="navbar-nav">

                    <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="aboutus.html">About Us</a></li>
                    <li class="nav-item dropdown">

                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/kalakshetra/aboutus.html">About Shankarananda

                    </li>

                </ul>

            </div>

        </div>
        <img src="/assets/mandala/border1.png" width="100%" alt="">

    <div class="container">
        <section class="training-section py-5" st>

            <div class="row g-4 align-items-stretch" style="border-bottom: 3px dashed #8c626c;border-radius: 30px;">

                <div class="col-lg-6 p-0">

                    <div class="main-training-card">

                        <div class="top-strip">
                            <img src="assets/Sklogo.png" alt="">
                            <span>Shankarananda Kalakshetra</span>
                        </div>

                        <div class="card-content">

                            <div class="content-image">
                                <img src="assets/training-1.jpg" alt="">
                            </div>

                            <div id="training-section" class="content-left">

                            </div>



                        </div>

                        <div class="bottom-info">

                            <div>
                                <h6>For Queries</h6>
                                <p>
                                    <a href="mailto:query.sk@gmail.com" class="links">
                                        query.sk@gmail.com
                                    </a>
                                </p>
                            </div>

                        </div>

                    </div>

                </div>

                <div class="col-lg-2 p-0 m-0">
                    <img src="assets/pillar.png" alt=""
                        style="width: -webkit-fill-available;height:-webkit-fill-available;margin-top: -60px;">
                </div>

                <div class="col-lg-4 p-0">

                    <div class="main-training-card contact-card">

                        <div class="top-strip">
                            <span style="font-size:40px;">Admission Form</span>
                        </div>

                        <div class="card-content p-4">

                            <form class="contact-form" id="admissionForm">

                                <div class="mb-3">
                                    <input type="text" class="form-control" name="stname" placeholder="Student Name">
                                </div>

                                <div class="mb-3">
                                    <input type="text" class="form-control" name="dob" placeholder="DOB"
                                        onfocus="this.type='date'" onblur="if(!this.value)this.type='text'">
                                </div>

                                <div class="mb-3">
                                    <input type="text" class="form-control" name="previous_experience"
                                        placeholder="Previous Experience, If any">
                                </div>

                                <div class="mb-3">
                                    <input type="text" class="form-control" name="previous_training_details"
                                        placeholder="Previous Training Details">
                                </div>

                                <div class="mb-3">
                                    <input type="text" class="form-control" name="previous_gurus"
                                        placeholder="Previous gurus/schools, If any:">
                                </div>

                                <h5>Parent/Guardian</h5>

                                <div class="mb-3">
                                    <input type="text" class="form-control" name="parentname1"
                                        placeholder="Name of Parent or Guardian">
                                </div>

                                <div class="mb-3">
                                    <input type="number" class="form-control" name="parentnumbers1"
                                        placeholder="Mobile No">
                                </div>

                                <div class="mb-3">
                                    <input type="email" class="form-control" name="parentemail1" placeholder="Email">
                                </div>

                                <div class="mb-3">
                                    <textarea class="form-control" name="address" rows="5"
                                        placeholder="Postal address for correspondence"></textarea>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">
                                        Select Class Location :
                                    </label>

                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="location" id="filmNagar"
                                            value="Film Nagar">
                                        <label class="form-check-label" for="filmNagar">
                                            Film Nagar
                                        </label>
                                    </div>

                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="location" id="secunderabad"
                                            value="Secunderabad">
                                        <label class="form-check-label" for="secunderabad">
                                            Secunderabad
                                        </label>
                                    </div>

                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="location" id="madhapur"
                                            value="Madhapur">
                                        <label class="form-check-label" for="madhapur">
                                            Madhapur
                                        </label>
                                    </div>
                                </div>

                                <button type="submit" class="submit-btn">
                                    Send Message
                                </button>

                            </form>
                        </div>

                    </div>

                </div>
            </div>

        </section>
    </div>
    <script>
        fetch('https://anandashankar.sidpz.com/api/section/training/')
            .then(res => res.json())
            .then(data => {

                const temp = document.createElement('div');
                temp.innerHTML = data.html_content;

                // Remove hidden elements
                temp.querySelectorAll('[style*="display:none"]').forEach(el => el.remove());

                // Get individual sections
                const training = temp.querySelector('.content-left');

                // Render separately
                if (training) {
                    document.getElementById('training-section').innerHTML = training.innerHTML;
                }
            })
            .catch(err => console.error(err));
    </script>
    <script>
        document.getElementById("admissionForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const formData = new FormData(this);

            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch(
                    "https://anandashankar.sidpz.com/api/admission/",
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify(data)
                    }
                );

                const result = await response.json();

                if (response.ok) {
                    alert("Admission submitted successfully");
                    console.log(result);
                    this.reset();
                } else {
                    alert("Submission failed");
                    console.log(result);
                }

            } catch (error) {
                console.error(error);
                alert("Server error");
            }
        });
    </script>
