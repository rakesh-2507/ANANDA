<head>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/fonts.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .tour_section {
            .accordion-button {
                font-size: 22px;
                font-weight: 600;
                background: #f8f5f2;
                font-family: 'Cormorant Garamond';
            }

            .accordion-button:not(.collapsed) {
                background: #f8f5f2;
                color: #000;
                box-shadow: none;
                font-family: 'Cormorant Garamond';
            }

            .accordion-button:focus {
                box-shadow: none;
            }

            .card {
                border-radius: 12px;
                min-width: 250px;
            }

            .accordion-body::-webkit-scrollbar,
            .d-flex::-webkit-scrollbar {
                height: 6px;
            }

            .d-flex::-webkit-scrollbar-thumb {
                background: #ccc;
                border-radius: 10px;
            }

            .accordion-body {
                overflow: hidden;
            }

            .cards-wrapper {
                overflow-x: auto;
                cursor: grab;
                user-select: none;
                scrollbar-width: none;
            }

            .cards-wrapper::-webkit-scrollbar {
                display: none;
            }

            .cards-wrapper.dragging {
                cursor: grabbing;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg" style="background: #ece7e2;">

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                ☰
            </button>

            <div class="collapse navbar-collapse justify-content-center" id="menu">

                <ul class="navbar-nav">

                    <li class="nav-item"><a class="nav-link" href="../home.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="../aboutus.html">About Us</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="kalakshetraMenu">
                            Kalakshetra
                        </a>

                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/kalakshetra/aboutus.html">About Shankarananda
                                    Kalakshetra</a></li>

                                    Tour</a></li>

            </div>

            <a href="../training.html" class="book-btn d-none d-lg-block">

        </div>
        <img src="../assets/mandala/border1.png" width="100%" alt="">

    <div class="container tour_section p-3">
            <h2 class="section-title">Tours</h2>
        <div class="accordion" id="tourAccordion"></div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        fetch('https://anandashankar.sidpz.com/api/ananda/')
            .then(res => res.json())
            .then(data => {

                // Group by year
                const grouped = data.reduce((acc, item) => {
                    const year = item.yyear || 'Unknown';

                    if (!acc[year]) {
                        acc[year] = [];
                    }

                    acc[year].push(item);
                    return acc;
                }, {});

                const accordion = document.getElementById('tourAccordion');

                // Sort years descending
                const years = Object.keys(grouped).sort((a, b) => b - a);

                years.forEach((year, index) => {

                    const cards = grouped[year].map(item => {

                        const date = item.dattim
                            ? new Date(item.dattim).toLocaleDateString('en-GB')
                            : 'N/A';

                        return `
                    <div class="card flex-shrink-0" style="width:250px;">
                        <div class="card-body">
                            <p><strong>Programme:</strong> ${item.programme || '-'}</p>
                            <p><strong>Date:</strong> ${date}</p>
                            <p><strong>Organizer:</strong> ${item.organiser || '-'}</p>
                            <p><strong>Venue:</strong> ${item.venue || '-'}</p>
                        </div>
                    </div>
                `;
                    }).join('');

                    accordion.innerHTML += `
                <div class="accordion-item">
                    <h2 class="accordion-header">
                        <button
                            class="accordion-button ${index !== 0 ? 'collapsed' : ''}"
                            type="button"
                            data-bs-toggle="collapse"
                            data-bs-target="#year${year}">
                            Year - ${year}
                        </button>
                    </h2>

                    <div
                        id="year${year}"
                        class="accordion-collapse collapse ${index === 0 ? 'show' : ''}"
                        data-bs-parent="#tourAccordion">

                        <div class="accordion-body">
                            <div class="cards-wrapper d-flex gap-3 overflow-auto pb-2">
                                ${cards}
                            </div>
                        </div>

                    </div>
                </div>
            `;
                });
                initCardDrag();
            })
            .catch(err => console.error(err));
    </script>
</body>

</html>
