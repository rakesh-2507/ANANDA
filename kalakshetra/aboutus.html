    <div class="container kala_aboutsection">

            <div class="col-lg-8">

    <script>
        fetch('https://anandashankar.sidpz.com/api/section/sk-about/')
            .then(res => res.json())
            .then(data => {

                const temp = document.createElement('div');
                temp.innerHTML = data.html_content;

                temp.querySelectorAll('[style*="display:none"]').forEach(el => el.remove());

                document.getElementById('content').innerHTML = temp.innerHTML;
            })
            .catch(err => console.error(err));
    </script>
